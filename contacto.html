<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario XinjiaTesa</title>
    <link href="css/principal.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #A62424 0%, #4A0E0E 100%);
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .contenedor-formulario {
            background-color: #fcfcfc; 
            padding: 30px;
            max-width: 460px;
            width: 100%;
            border: 7px double #6d1600; 
            border-radius: 8px; 
        }

        .contenedor-formulario h1 {
            color: #0B4F6C;
        }

        
        .form-label {
            color: #0B4F6C;
        }

        .btn-enviar {
            background-color: #A62424;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            padding: 12px;
            border: none;
            transition: background 0.3s;
        }

        .btn-enviar:hover {
            background-color: #7A1A1A;
            color: white;
        }
    </style>
</head>
<body>

    <nav class="nav-navegacion">
    <div class="nav-contenedor">
        <ul class="nav-lista">
            <li class="titulo"><img src="logo/logo.jpeg" class="logo-titulo">ChinjiaTesa</li>
            <li class="nav-item"><a href="index.html" class="nav-link">Principal</a></li>
            <li class="nav-item"><a href="comida.html" class="nav-link">Comida</a></li>
            <li class="nav-item"><a href="contacto.html" class="nav-link">Contacto</a></li>
            <li class="nav-item"><a href="Nosotros.html" class="nav-link">Nosotros</a></li>
        </ul>
    </div>
</nav>

    <div class="contenedor-formulario shadow-lg">
        <h1 class="text-center fw-bold mb-1">🐉 XinjiaTesa 🏮</h1>
        <p class="text-center text-muted mb-4">Escribe tus datos y tu pedido.</p>

        <form action="https://formspree.io/f/xrewwkob" method="POST">
            
            <div class="mb-3">
                <label for="nombre" class="form-label fw-bold">Tu Nombre:</label>
                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre" required>
            </div>

            <div class="mb-3">
                <label for="telefono" class="form-label fw-bold">Teléfono:</label>
                <input type="tel" class="form-control" id="telefono" name="telefono" placeholder="Numero" required>
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label fw-bold">Correo Electrónico:</label>
                <input type="email" class="form-control" id="correo" name="email" placeholder="Gmail" required>
            </div>

            <div class="mb-3">
                <label for="direccion" class="form-label fw-bold">Dirección de entrega:</label>
                <input type="text" class="form-control" id="direccion" name="direccion" placeholder="Dirección" required>
            </div>

            <div class="mb-3">
                <label for="pedido" class="form-label fw-bold">¿Qué deseas pedir hoy?:</label>
                <textarea class="form-control" id="pedido" name="pedido_cliente" rows="4" placeholder="Escribe aquí lo que quieres ordenar..." required></textarea>
            </div>

            <!-- CONTENEDOR DEL FORMULARIO -->
<div class="container my-5">
    <div class="mx-auto" style="max-width: 500px;">
        <form>

            <div class="mb-3">
                <label class="form-label fw-bold">Método de pago:</label>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="pago" id="efectivo" checked>
                    <label class="form-check-label text-dark" for="efectivo">
                        Efectivo 💵
                    </label>
                </div>

                <div class="form-check my-2">
                    <input class="form-check-input" type="radio" name="pago" id="tarjeta">
                    <label class="form-check-label text-dark" for="tarjeta">
                        Tarjeta (Terminal al entregar) 💳
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-enviar w-100">
                Enviar Pedido ㊎
            </button>

        </form>
    </div>
</div>

<footer class="footer-navegacion">
    <div class="footer-contenedor">
        <p class="footer-telefono">Teléfono: +502 1234-5678</p>
        <p class="footer-copyright">&copy; 2026 ChinjiaTesa. Todos los derechos reservados.</p>
    </div>

</body>
</html>
